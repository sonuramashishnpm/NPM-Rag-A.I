<!DOCTYPE html>
<html lang="en">
  <head>
    <title>NPM Rag A.I</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='NPMaistyle.css')}}" />
  </head>
  <body>
    <header class="header">NPM Rag A.I</header>

    <video autoplay muted loop id="background-video">
      <source src="https://npmexplorer.netlify.app/NPM%20ai%20backgrond%20video.mp4" />
    </video>
    <div id="video-overlay"></div>

    <main class="container">
      <div class="card" style="margin-bottom: 20px">
        <button onclick="product('Chat')">Chat</button>
        <button onclick="product('use')">Use Your ORG RAG Chat</button>
        <button onclick="product('develop')">Develop Rag Chat</button>
      </div>

      <div class="card" id="card2" style="margin-bottom: 20px; display: none">
        <div id="card8" style="display: none"><h2>Develop RAG Chat</h2></div>
        <div id="card3" style="display: none"><h2>Use NPMAI Rag chat</h2></div>

        <label><h4>Public or Private Visibility</h4></label>
        <select id="tools" onchange="tab(this.value)">
          <option value="publi">Public</option>
          <option value="privat">Private</option></select
        ><br /><br />

        <section id="rag_dev_pv" style="display: none">
          <label><h3>Secret User_name</h3></label>
          <input
            type="text"
            id="secret_user"
            placeholder="Enter a Secret User_name"
          />
        </section>
      </div>

      <div id="card1">
        <div
          id="chat-box"
          style="
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ccc;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            white-space: pre-wrap;
          "
        ></div>
      </div>

      <div class="card">
        <section id="sectioninput">
          <label>Upload PDF(s)</label>
          <input type="file" id="pdf_file" accept=".pdf" multiple /><br /><br />

          <label>Upload Image(s)</label>
          <input
            type="file"
            id="image_file"
            accept=".png,.jpg,.jpeg"
            multiple
          /><br /><br />

          <label>YouTube Link</label>
          <input id="link" placeholder="Enter YouTube video link" /><br /><br />

          <label>Upload Video(s)</label>
          <input type="file" id="video_file" accept=".mp4" multiple />
        </section>

        <section id="section_input_db">
          <label>Knowledge Base Name</label>
          <input id="db" placeholder="Knowledge Base Name" /><br />

          <section id="section_input_quest">
            <label>Your Question</label>
            <input id="question" placeholder="Your question" />
          </section>
        </section>
        <button onclick="ask()">Send</button>
      </div>
    </main>

    <script>
      let currentMode = "Chat";

      function tab(val) {
        document.getElementById("rag_dev_pv").style.display =
          val === "privat" ? "block" : "none";
      }

      function product(product_name) {
        currentMode = product_name;
        const chat_c = document.getElementById("card1");
        const develop_c = document.getElementById("card2");
        const use_t = document.getElementById("card3");
        const dev_t = document.getElementById("card8");
        const inputs = document.getElementById("sectioninput");
        const q_box = document.getElementById("section_input_quest");

        develop_c.style.display = product_name === "Chat" ? "none" : "block";

        if (product_name === "Chat") {
          inputs.style.display = "block";
          q_box.style.display = "block";
          use_t.style.display = "none";
          dev_t.style.display = "none";
        } else if (product_name === "use") {
          use_t.style.display = "block";
          dev_t.style.display = "none";
          inputs.style.display = "none";
          q_box.style.display = "block";
        } else if (product_name === "develop") {
          use_t.style.display = "none";
          dev_t.style.display = "block";
          inputs.style.display = "block";
          q_box.style.display = "none";
        }
      }

      function appendMessage(role, text) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.style.marginBottom = "15px";
        msgDiv.innerHTML = `<strong>${role}:</strong> ${text}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      async function ask() {
        const fd = new FormData();

        fd.append("DB_PATH", document.getElementById("db").value);
        fd.append("query", document.getElementById("question").value);
        fd.append("DB_Privacy", document.getElementById("tools").value);
        fd.append("secret_key", document.getElementById("secret_user").value);

        const fileInputs = ["pdf_file", "image_file", "video_file"];
        fileInputs.forEach((id) => {
          const files = document.getElementById(id).files;
          for (let i = 0; i < files.length; i++) {
            fd.append("file", files[i]);
          }
        });

        const yt = document.getElementById("link").value.trim();
        if (yt) {
          fd.append("link", yt);
          fd.append("output_path", "yt_video.mp4");
        }

        let targetUrl = "/ask";
        if (currentMode === "use") targetUrl = "/use";
        if (currentMode === "develop") targetUrl = "/develop";

        appendMessage(
          "You",
          document.getElementById("question").value || "Uploading files..."
        );

        try {
          const res = await fetch(targetUrl, { method: "POST", body: fd });
          const j = await res.json();
          appendMessage("AI", j.response);
        } catch (err) {
          appendMessage("Error", "Could not connect to server.");
        }
      }
    </script>
  </body>
</html>
